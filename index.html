    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <style>
      #root:empty,
      .static-fallback {
        min-height: 100vh;

      .static-fallback {
        box-sizing: border-box;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;

      }

      .static-fallback__panel {
        width: min(100%, 760px);
        border: 1px solid rgb(255 255 255 / 0.13);
        border-radius: 28px;
        padding: clamp(28px, 6vw, 56px);
        background: rgb(14 12 26 / 0.6);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 80px rgb(0 0 0 / 0.46);
      }

      .static-fallback__eyebrow {

        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        color: #4ce1ff;
      }

      .static-fallback h1 {
        margin: 0;
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(44px, 10vw, 84px);
        font-weight: 500;
        line-height: 0.98;
      }

      .static-fallback__title {
        margin: 22px 0 0;
        max-width: 620px;
        font-size: clamp(18px, 3.4vw, 24px);
        line-height: 1.5;
        color: rgb(232 239 231 / 0.76);
      }

      .static-fallback__links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .static-fallback a {
        color: #eef5ed;
      }

      .static-fallback__links a {

        border-radius: 999px;
        padding: 11px 16px;

        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

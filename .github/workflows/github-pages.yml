# Builds with the correct Vite base for GitHub Pages (project vs user site).
# Enable in repo Settings -> Pages -> Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set Vite base for Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" = "$(echo "$OWNER.github.io" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "User/org site -> base /"
          else
            echo "VITE_BASE_PATH=/$REPO/" >> "$GITHUB_ENV"
            echo "Project site -> base /$REPO/"
          fi

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
